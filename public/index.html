<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>IWLBOT</title>
</head>
<body>

  <h1>Mini App</h1>

  <p id="user">Loading...</p>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script>
    const tg = window.Telegram.WebApp;

    tg.ready();

    const user = tg.initDataUnsafe?.user;

    document.getElementById("user").innerText =
      user ? "Your ID: " + user.id : "NO USER (open via Telegram)";
  </script>

</body>
</html>
