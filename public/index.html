<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>IWLBOT</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }
  </style>
</head>
<body>

<h1>Mini App Debug</h1>

<p id="status">Loading...</p>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
  try {
    const tg = window.Telegram?.WebApp;

    if (!tg) {
      document.getElementById("status").innerText =
        "NOT IN TELEGRAM (no WebApp object)";
      throw new Error("No Telegram WebApp");
    }

    tg.ready();

    const user = tg.initDataUnsafe?.user;

    if (!user) {
      document.getElementById("status").innerText =
        "NO USER DATA (open via Telegram button)";
    } else {
      document.getElementById("status").innerText =
        "USER ID: " + user.id + " | " + user.first_name;
    }

    console.log("initData:", tg.initData);
    console.log("user:", user);

  } catch (e) {
    console.error(e);
    document.getElementById("status").innerText =
      "ERROR: " + e.message;
  }
</script>

</body>
</html>
