<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>DEBUG</title>
</head>
<body>

<h1>BOOTING...</h1>
<div id="out"></div>

<script>
  function log(msg) {
    document.getElementById("out").innerHTML += "<p>" + msg + "</p>";
  }

  log("HTML loaded");

  try {
    log("loading Telegram script...");

  } catch (e) {
    log("ERROR INIT: " + e.message);
  }
</script>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
  try {
    log("Telegram object: " + typeof window.Telegram);

    const tg = window.Telegram?.WebApp;

    if (!tg) {
      log("NO TELEGRAM WEBAPP");
      throw new Error("no webapp");
    }

    tg.ready();

    log("WebApp ready");

    log("initData: " + (tg.initData || "EMPTY"));

    const user = tg.initDataUnsafe?.user;

    log("user: " + JSON.stringify(user));

    document.body.style.background = "#d4ffd4";

  } catch (e) {
    log("CRASH: " + e.message);
    document.body.style.background = "#ffd4d4";
  }
</script>

</body>
</html>
